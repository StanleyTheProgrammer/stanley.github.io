<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>3D Multiplayer Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            background-color: #111;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid #444;
        }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }
        #joystick-zone {
            width: 140px;
            height: 140px;
            background: rgba(20,20,20,0.4);
            border-radius: 70px;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            touch-action: none;
            margin-bottom: 10px;
        }
        #shoot-btn {
            width: 100px;
            height: 100px;
            background: rgba(200,30,30,0.7);
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 3px solid rgba(255,255,255,0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
            pointer-events: auto;
            touch-action: none;
            user-select: none;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
            margin-bottom: 30px;
            margin-right: 10px;
            transition: transform 0.05s;
        }
        #shoot-btn:active {
            transform: scale(0.9);
            background: rgba(255,50,50,0.9);
        }
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,30,0.95);
            color: white;
            padding: 30px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #3a5a7a;
            text-align: center;
            z-index: 100;
            min-width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            pointer-events: auto;
        }
        #menu.hidden {
            display: none;
        }
        #menu h2 {
            margin-top: 0;
            color: #7ab7ef;
            text-shadow: 0 0 10px #1e4f8a;
        }
        #menu input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #2a2a3c;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            border: 1px solid #4a6c8a;
        }
        #menu button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: #2e7d32;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 3px solid #1b5e20;
        }
        #menu button.secondary {
            background: #1565c0;
            border-bottom: 3px solid #0d47a1;
        }
        #menu button:hover {
            filter: brightness(1.1);
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #aaccff;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 1px solid #000;
            pointer-events: none;
            z-index: 5;
        }
        #health-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #555;
            z-index: 15;
            backdrop-filter: blur(4px);
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.1s;
        }
        #scoreboard {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            font-size: 16px;
            border: 1px solid #666;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #joystick-zone { width: 120px; height: 120px; }
            #shoot-btn { width: 80px; height: 80px; font-size: 20px; }
        }
    </style>
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- NippleJS for joystick -->
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
</head>
<body>
    <div id="info">🔫 3D Shooter | <span id="connection-status">Offline</span></div>
    <div id="scoreboard">❤️ <span id="health-value">100</span> | 🎯 <span id="kills-value">0</span> Kills</div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="crosshair"></div>

    <div id="menu">
        <h2>MULTIPLAYER SHOOTER</h2>
        <p style="font-size:14px; margin-top:-5px; opacity:0.8;">Peer-to-Peer · Mobile Ready</p>
        <input type="text" id="peer-id-input" placeholder="Your ID (auto-generated)" readonly>
        <input type="text" id="remote-id-input" placeholder="Host ID to join">
        <button id="host-btn" class="secondary">🎮 HOST GAME</button>
        <button id="join-btn">🔗 JOIN GAME</button>
        <button id="disconnect-btn" style="background:#6c757d; border-bottom-color:#495057;">🚪 DISCONNECT</button>
        <div id="status">Ready. Host to create a game.</div>
        <p style="font-size:12px; margin-top:15px; opacity:0.6;">Use joystick to move, tap SHOOT to fire.<br>Host validates hits.</p>
    </div>

    <div id="ui-container">
        <div id="joystick-zone"></div>
        <div id="shoot-btn">🔫<br>SHOOT</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Configuration ---
        const WORLD_SIZE = 40;
        const PLAYER_HEIGHT = 2.0;
        const PLAYER_SPEED = 0.12;
        const SHOOT_COOLDOWN = 300; // ms
        const RESPAWN_TIME = 3000;
        const UPDATE_RATE = 50; // ms

        // --- Global State ---
        let scene, camera, renderer, labelRenderer;
        let peer, connections = {}; // data connections to other peers (key: peerId)
        let myPeerId = null;
        let isHost = false;
        let gameActive = false;
        
        // Player data
        let players = new Map(); // key: peerId, value: { mesh, health, kills, nameTag, lastUpdate }
        let localPlayer = {
            id: null,
            mesh: null,
            health: 100,
            kills: 0,
            position: new THREE.Vector3(0, PLAYER_HEIGHT/2, 0),
            rotation: 0,
            velocity: new THREE.Vector3(),
            lastShot: 0
        };
        
        // Controls
        let joystick = null;
        let moveDirection = { x: 0, y: 0 };
        let shootPressed = false;
        let keys = { w: false, s: false, a: false, d: false };
        
        // Obstacles / world objects
        let obstacles = [];
        
        // UI elements
        const menuDiv = document.getElementById('menu');
        const statusDiv = document.getElementById('status');
        const connStatusSpan = document.getElementById('connection-status');
        const healthSpan = document.getElementById('health-value');
        const killsSpan = document.getElementById('kills-value');
        const healthFill = document.getElementById('health-fill');
        const peerIdInput = document.getElementById('peer-id-input');
        const remoteIdInput = document.getElementById('remote-id-input');
        const hostBtn = document.getElementById('host-btn');
        const joinBtn = document.getElementById('join-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');
        
        // --- Initialization ---
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.FogExp2(0x111122, 0.015);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            const d = 30;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);
            
            const fillLight = new THREE.PointLight(0x446688, 0.5);
            fillLight.position.set(-10, 10, 10);
            scene.add(fillLight);
            
            // Ground
            const groundGeometry = new THREE.CircleGeometry(WORLD_SIZE, 32);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2a5a5a, roughness: 0.8, metalness: 0.1 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            ground.receiveShadow = true;
            scene.add(ground);
            
            // Grid helper
            const gridHelper = new THREE.GridHelper(WORLD_SIZE*2, 20, 0x88aacc, 0x334455);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            
            // Decorative obstacles
            createObstacles();
            
            // Boundaries visual
            const boundaryMaterial = new THREE.LineBasicMaterial({ color: 0x5a7a9a });
            const boundaryPoints = [
                new THREE.Vector3(-WORLD_SIZE, 0.1, -WORLD_SIZE),
                new THREE.Vector3( WORLD_SIZE, 0.1, -WORLD_SIZE),
                new THREE.Vector3( WORLD_SIZE, 0.1,  WORLD_SIZE),
                new THREE.Vector3(-WORLD_SIZE, 0.1,  WORLD_SIZE),
                new THREE.Vector3(-WORLD_SIZE, 0.1, -WORLD_SIZE)
            ];
            const boundaryGeometry = new THREE.BufferGeometry().setFromPoints(boundaryPoints);
            const boundaryLine = new THREE.Line(boundaryGeometry, boundaryMaterial);
            scene.add(boundaryLine);
        }
        
        function createObstacles() {
            const boxGeo = new THREE.BoxGeometry(2, 1, 2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x8b5e3c, roughness: 0.7 });
            const positions = [
                { x: 8, z: 5 }, { x: -7, z: -8 }, { x: 10, z: -10 }, { x: -12, z: 12 },
                { x: 15, z: -5 }, { x: -15, z: 7 }, { x: 5, z: 15 }, { x: -5, z: -15 }
            ];
            positions.forEach(pos => {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(pos.x, 0.5, pos.z);
                box.receiveShadow = true;
                box.castShadow = true;
                scene.add(box);
                obstacles.push(box);
            });
            
            // Pillars
            const pillarGeo = new THREE.CylinderGeometry(0.8, 1, 2.5);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x7a8a9a });
            const pillarPos = [{ x: 18, z: 0 }, { x: -18, z: 0 }, { x: 0, z: 18 }, { x: 0, z: -18 }];
            pillarPos.forEach(pos => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(pos.x, 1.25, pos.z);
                pillar.receiveShadow = true;
                pillar.castShadow = true;
                scene.add(pillar);
                obstacles.push(pillar);
            });
        }
        
        function createPlayerMesh(color = 0x3498db, isLocal = false) {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, PLAYER_HEIGHT, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: isLocal ? new THREE.Color(0x224466) : new THREE.Color(0x000000) });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = PLAYER_HEIGHT/2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Head
            const headGeo = new THREE.SphereGeometry(0.35);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = PLAYER_HEIGHT + 0.15;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Gun indicator (a small box)
            const gunGeo = new THREE.BoxGeometry(0.2, 0.1, 0.8);
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const gun = new THREE.Mesh(gunGeo, gunMat);
            gun.position.set(0.5, PLAYER_HEIGHT*0.7, 0.4);
            gun.castShadow = true;
            group.add(gun);
            
            // Direction indicator
            const arrowGeo = new THREE.ConeGeometry(0.3, 0.6);
            const arrowMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const arrow = new THREE.Mesh(arrowGeo, arrowMat);
            arrow.position.set(0, 0.2, 0.8);
            arrow.rotation.x = Math.PI / 2;
            arrow.castShadow = true;
            group.add(arrow);
            
            return group;
        }
        
        function createNameTag(text, color = '#ffffff') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 3px black';
            div.style.padding = '2px 8px';
            div.style.background = 'rgba(0,0,0,0.5)';
            div.style.borderRadius = '12px';
            div.style.pointerEvents = 'none';
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }
        
        // --- Networking Setup ---
        function initializePeer() {
            myPeerId = 'player-' + Math.random().toString(36).substr(2, 8);
            peerIdInput.value = myPeerId;
            
            peer = new Peer(myPeerId, {
                debug: 2,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            
            peer.on('open', (id) => {
                console.log('Peer open, ID:', id);
                statusDiv.innerText = 'Connected to signaling. Ready.';
                connStatusSpan.innerText = 'Signaling Ready';
            });
            
            peer.on('connection', (conn) => {
                console.log('Incoming connection from:', conn.peer);
                if (isHost) {
                    setupConnection(conn);
                    statusDiv.innerText = `Player ${conn.peer.slice(0,6)} joined.`;
                    // Send current world state to new player
                    setTimeout(() => {
                        sendWorldState(conn);
                    }, 500);
                } else {
                    // Clients shouldn't accept direct connections except from host
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                statusDiv.innerText = 'Error: ' + err.type;
                connStatusSpan.innerText = 'Error';
            });
            
            peer.on('disconnected', () => {
                connStatusSpan.innerText = 'Disconnected';
                statusDiv.innerText = 'Disconnected from signaling.';
            });
        }
        
        function setupConnection(conn) {
            connections[conn.peer] = conn;
            
            conn.on('data', (data) => {
                handleNetworkMessage(conn.peer, data);
            });
            
            conn.on('close', () => {
                console.log('Connection closed:', conn.peer);
                removePlayer(conn.peer);
                delete connections[conn.peer];
                if (isHost) {
                    broadcastPlayerLeave(conn.peer);
                }
                statusDiv.innerText = `Player ${conn.peer.slice(0,6)} left.`;
            });
            
            conn.on('error', (err) => {
                console.error('Connection error:', err);
            });
        }
        
        function handleNetworkMessage(fromPeerId, data) {
            if (!gameActive) return;
            
            if (isHost) {
                // Host receives client input
                if (data.type === 'input') {
                    const player = players.get(fromPeerId);
                    if (player) {
                        // Update player state based on input (authoritative)
                        player.lastInput = data;
                        // Process input in game loop
                    }
                } else if (data.type === 'shoot') {
                    handleShootFromClient(fromPeerId, data);
                }
            } else {
                // Client receives world state from host
                if (data.type === 'worldState') {
                    applyWorldState(data.players);
                } else if (data.type === 'playerJoined') {
                    addRemotePlayer(data.id, data.color, data.position);
                } else if (data.type === 'playerLeft') {
                    removePlayer(data.id);
                } else if (data.type === 'shotFired') {
                    // Visual feedback
                    createMuzzleFlash(data.position);
                } else if (data.type === 'hit') {
                    if (data.targetId === myPeerId) {
                        localPlayer.health = Math.max(0, data.health);
                        updateLocalUI();
                        if (localPlayer.health <= 0) {
                            respawnLocal();
                        }
                    } else {
                        const target = players.get(data.targetId);
                        if (target) target.health = data.health;
                    }
                }
            }
        }
        
        function sendToHost(data) {
            if (!isHost && connections[Object.keys(connections)[0]]) {
                connections[Object.keys(connections)[0]].send(data);
            }
        }
        
        function broadcastToClients(data, excludePeerId = null) {
            if (!isHost) return;
            Object.entries(connections).forEach(([peerId, conn]) => {
                if (peerId !== excludePeerId) {
                    conn.send(data);
                }
            });
        }
        
        function sendWorldState(conn) {
            const state = {
                type: 'worldState',
                players: {}
            };
            players.forEach((p, id) => {
                state.players[id] = {
                    position: p.mesh.position,
                    rotation: p.mesh.rotation.y,
                    health: p.health,
                    kills: p.kills
                };
            });
            // Also include local player (host)
            state.players[myPeerId] = {
                position: localPlayer.mesh.position,
                rotation: localPlayer.mesh.rotation.y,
                health: localPlayer.health,
                kills: localPlayer.kills
            };
            conn.send(state);
        }
        
        function applyWorldState(playersState) {
            // Update remote players
            Object.entries(playersState).forEach(([id, data]) => {
                if (id === myPeerId) return;
                let player = players.get(id);
                if (!player) {
                    addRemotePlayer(id, 0xe67e22, data.position);
                    player = players.get(id);
                }
                if (player) {
                    player.mesh.position.copy(data.position);
                    player.mesh.rotation.y = data.rotation;
                    player.health = data.health;
                    player.kills = data.kills;
                    // Update name tag
                    if (player.nameTag) {
                        player.nameTag.element.textContent = `${id.slice(0,6)} ❤️${Math.ceil(player.health)}`;
                    }
                }
            });
        }
        
        function broadcastPlayerLeave(peerId) {
            broadcastToClients({ type: 'playerLeft', id: peerId });
        }
        
        function removePlayer(peerId) {
            const player = players.get(peerId);
            if (player) {
                scene.remove(player.mesh);
                scene.remove(player.nameTag);
                players.delete(peerId);
            }
        }
        
        function addRemotePlayer(id, color, position) {
            if (players.has(id) || id === myPeerId) return;
            const mesh = createPlayerMesh(color);
            mesh.position.copy(position);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            const nameTag = createNameTag(`${id.slice(0,6)} ❤️100`, '#aaccff');
            nameTag.position.set(0, 3.2, 0);
            mesh.add(nameTag);
            
            players.set(id, {
                mesh: mesh,
                health: 100,
                kills: 0,
                nameTag: nameTag,
                lastInput: null
            });
        }
        
        // --- Game Logic (Host) ---
        function handleShootFromClient(shooterId, data) {
            if (!isHost) return;
            const shooter = players.get(shooterId);
            if (!shooter || shooter.health <= 0) return;
            
            const now = Date.now();
            if (shooter.lastShot && (now - shooter.lastShot) < SHOOT_COOLDOWN) return;
            shooter.lastShot = now;
            
            // Raycast from shooter position in direction
            const origin = shooter.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0));
            const direction = new THREE.Vector3(0, 0, 1).applyEuler(new THREE.Euler(0, data.rotation, 0));
            
            const raycaster = new THREE.Raycaster(origin, direction, 0, 50);
            const meshes = [];
            players.forEach(p => { if (p.mesh) meshes.push(p.mesh); });
            // Also check local player (host)
            if (localPlayer.mesh) meshes.push(localPlayer.mesh);
            
            const intersects = raycaster.intersectObjects(meshes, true);
            if (intersects.length > 0) {
                let hitPlayerMesh = intersects[0].object;
                while (hitPlayerMesh.parent && !hitPlayerMesh.parent.isGroup) hitPlayerMesh = hitPlayerMesh.parent;
                
                let targetId = null;
                if (hitPlayerMesh === localPlayer.mesh) {
                    targetId = myPeerId;
                } else {
                    for (let [id, p] of players.entries()) {
                        if (p.mesh === hitPlayerMesh) {
                            targetId = id;
                            break;
                        }
                    }
                }
                
                if (targetId) {
                    const damage = 34;
                    if (targetId === myPeerId) {
                        localPlayer.health = Math.max(0, localPlayer.health - damage);
                        updateLocalUI();
                        if (localPlayer.health <= 0) {
                            respawnHost();
                            shooter.kills++;
                        }
                        broadcastToClients({ type: 'hit', targetId: myPeerId, health: localPlayer.health });
                    } else {
                        const target = players.get(targetId);
                        if (target) {
                            target.health = Math.max(0, target.health - damage);
                            if (target.health <= 0) {
                                // Respawn
                                target.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
                                target.health = 100;
                                shooter.kills++;
                            }
                            broadcastToClients({ type: 'hit', targetId: targetId, health: target.health });
                        }
                    }
                    
                    // Notify shooter about hit
                    const shooterConn = connections[shooterId];
                    if (shooterConn) {
                        shooterConn.send({ type: 'hitConfirm', targetId: targetId });
                    }
                }
            }
            
            // Broadcast shot fired for effects
            broadcastToClients({ type: 'shotFired', position: origin, direction: direction });
        }
        
        function respawnHost() {
            localPlayer.health = 100;
            localPlayer.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
            updateLocalUI();
        }
        
        function respawnLocal() {
            localPlayer.health = 100;
            localPlayer.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
            updateLocalUI();
        }
        
        // --- Local Player Update ---
        function updateLocalPlayer(deltaTime) {
            if (!localPlayer.mesh || !gameActive) return;
            
            // Movement from joystick or keyboard
            let moveX = moveDirection.x;
            let moveZ = moveDirection.y;
            
            // Keyboard fallback
            if (keys.w) moveZ -= 1;
            if (keys.s) moveZ += 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                moveX /= len;
                moveZ /= len;
                
                const speed = PLAYER_SPEED * deltaTime * 60;
                const newPos = localPlayer.mesh.position.clone();
                newPos.x += moveX * speed;
                newPos.z += moveZ * speed;
                
                // Boundary
                newPos.x = Math.max(-WORLD_SIZE+1, Math.min(WORLD_SIZE-1, newPos.x));
                newPos.z = Math.max(-WORLD_SIZE+1, Math.min(WORLD_SIZE-1, newPos.z));
                
                // Simple collision with obstacles
                let collides = false;
                for (let obs of obstacles) {
                    const dx = newPos.x - obs.position.x;
                    const dz = newPos.z - obs.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    if (dist < 1.2) { collides = true; break; }
                }
                if (!collides) {
                    localPlayer.mesh.position.copy(newPos);
                }
                
                // Rotation towards movement
                const angle = Math.atan2(moveX, moveZ);
                localPlayer.mesh.rotation.y = angle;
            }
            
            // Send input to host if client
            if (!isHost && gameActive) {
                sendToHost({
                    type: 'input',
                    position: localPlayer.mesh.position,
                    rotation: localPlayer.mesh.rotation.y,
                    timestamp: Date.now()
                });
            }
            
            // Shooting
            if (shootPressed) {
                const now = Date.now();
                if (now - localPlayer.lastShot > SHOOT_COOLDOWN) {
                    localPlayer.lastShot = now;
                    if (isHost) {
                        // Host shooting logic
                        performLocalShoot();
                    } else {
                        sendToHost({
                            type: 'shoot',
                            rotation: localPlayer.mesh.rotation.y,
                            position: localPlayer.mesh.position
                        });
                    }
                }
            }
        }
        
        function performLocalShoot() {
            // Host shoots, similar to handleShootFromClient but for local
            const origin = localPlayer.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0));
            const direction = new THREE.Vector3(0, 0, 1).applyEuler(new THREE.Euler(0, localPlayer.mesh.rotation.y, 0));
            
            const raycaster = new THREE.Raycaster(origin, direction, 0, 50);
            const meshes = [];
            players.forEach(p => { if (p.mesh) meshes.push(p.mesh); });
            
            const intersects = raycaster.intersectObjects(meshes, true);
            if (intersects.length > 0) {
                let hitMesh = intersects[0].object;
                while (hitMesh.parent && !hitMesh.parent.isGroup) hitMesh = hitMesh.parent;
                
                for (let [id, p] of players.entries()) {
                    if (p.mesh === hitMesh) {
                        p.health = Math.max(0, p.health - 34);
                        if (p.health <= 0) {
                            p.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
                            p.health = 100;
                            localPlayer.kills++;
                            updateLocalUI();
                        }
                        broadcastToClients({ type: 'hit', targetId: id, health: p.health });
                        break;
                    }
                }
            }
            broadcastToClients({ type: 'shotFired', position: origin });
        }
        
        function createMuzzleFlash(pos) {
            // Visual effect
        }
        
        // --- Host Game Loop ---
        let lastHostUpdate = 0;
        function hostGameLoop() {
            if (!isHost || !gameActive) return;
            const now = Date.now();
            if (now - lastHostUpdate > UPDATE_RATE) {
                // Process client inputs
                players.forEach((player, id) => {
                    if (player.lastInput) {
                        // Apply input (simple trust for movement, but boundary check)
                        player.mesh.position.copy(player.lastInput.position);
                        player.mesh.rotation.y = player.lastInput.rotation;
                    }
                });
                
                // Broadcast world state
                const state = {
                    type: 'worldState',
                    players: {}
                };
                players.forEach((p, id) => {
                    state.players[id] = {
                        position: p.mesh.position,
                        rotation: p.mesh.rotation.y,
                        health: p.health,
                        kills: p.kills
                    };
                });
                state.players[myPeerId] = {
                    position: localPlayer.mesh.position,
                    rotation: localPlayer.mesh.rotation.y,
                    health: localPlayer.health,
                    kills: localPlayer.kills
                };
                broadcastToClients(state);
                
                lastHostUpdate = now;
            }
        }
        
        // --- UI Updates ---
        function updateLocalUI() {
            healthSpan.textContent = Math.ceil(localPlayer.health);
            killsSpan.textContent = localPlayer.kills;
            healthFill.style.width = Math.max(0, localPlayer.health) + '%';
        }
        
        // --- Game Loop ---
        let clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            
            const deltaTime = clock.getDelta();
            const elapsedTime = performance.now();
            
            if (gameActive && localPlayer.mesh) {
                updateLocalPlayer(deltaTime);
                
                // Camera follow
                const playerPos = localPlayer.mesh.position;
                camera.position.x = playerPos.x;
                camera.position.z = playerPos.z + 6;
                camera.position.y = playerPos.y + 5;
                camera.lookAt(playerPos.clone().add(new THREE.Vector3(0, 1.5, 0)));
            }
            
            if (isHost) {
                hostGameLoop();
            }
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        // --- Event Listeners & Setup ---
        function initControls() {
            // Joystick
            const zone = document.getElementById('joystick-zone');
            joystick = nipplejs.create({
                zone: zone,
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'blue',
                size: 80,
                lockY: false,
                lockX: false
            });
            joystick.on('move', (evt, data) => {
                if (!gameActive) return;
                const force = Math.min(data.force, 1);
                const angle = data.angle.radian;
                moveDirection.x = Math.sin(angle) * force;
                moveDirection.y = -Math.cos(angle) * force;
            }).on('end', () => {
                moveDirection.x = 0;
                moveDirection.y = 0;
            });
            
            // Shoot button
            const shootBtn = document.getElementById('shoot-btn');
            shootBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                shootPressed = true;
            });
            shootBtn.addEventListener('touchend', (e) => {
                e.preventDefault();
                shootPressed = false;
            });
            shootBtn.addEventListener('mousedown', () => shootPressed = true);
            shootBtn.addEventListener('mouseup', () => shootPressed = false);
            shootBtn.addEventListener('mouseleave', () => shootPressed = false);
            
            // Keyboard
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') keys.w = true;
                if (e.code === 'KeyS') keys.s = true;
                if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyD') keys.d = true;
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') keys.w = false;
                if (e.code === 'KeyS') keys.s = false;
                if (e.code === 'KeyA') keys.a = false;
                if (e.code === 'KeyD') keys.d = false;
            });
        }
        
        function startGame() {
            gameActive = true;
            menuDiv.classList.add('hidden');
            connStatusSpan.innerText = isHost ? 'Hosting' : 'Connected';
            statusDiv.innerText = isHost ? 'Game active (Host)' : 'Game active (Client)';
            
            // Create local player mesh
            localPlayer.mesh = createPlayerMesh(0x3498db, true);
            localPlayer.mesh.position.set((Math.random()-0.5)*10, PLAYER_HEIGHT/2, (Math.random()-0.5)*10);
            localPlayer.mesh.castShadow = true;
            localPlayer.mesh.receiveShadow = true;
            scene.add(localPlayer.mesh);
            
            const nameTag = createNameTag('YOU', '#7ab7ef');
            nameTag.position.set(0, 3.2, 0);
            localPlayer.mesh.add(nameTag);
            
            localPlayer.health = 100;
            localPlayer.kills = 0;
            updateLocalUI();
        }
        
        // --- Button Handlers ---
        hostBtn.addEventListener('click', () => {
            isHost = true;
            initializePeer();
            peer.on('open', () => {
                startGame();
            });
        });
        
        joinBtn.addEventListener('click', () => {
            const hostId = remoteIdInput.value.trim();
            if (!hostId) {
                statusDiv.innerText = 'Enter Host ID';
                return;
            }
            isHost = false;
            initializePeer();
            peer.on('open', () => {
                const conn = peer.connect(hostId, { reliable: true });
                setupConnection(conn);
                conn.on('open', () => {
                    startGame();
                });
            });
        });
        
        disconnectBtn.addEventListener('click', () => {
            location.reload();
        });
        
        // --- Resize handler ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // --- Initialize ---
        initThree();
        initControls();
        animate();
        
        // Generate random ID for input field
        peerIdInput.value = 'player-' + Math.random().toString(36).substr(2, 8);
        
        console.log('Ready. Click Host or Join with a friend.');
    </script>
</body>
</html>
