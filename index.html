<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Roblox Generator • Broke Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 20%, rgba(255, 100, 50, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      max-width: 500px;
      width: 100%;
      background: rgba(18, 25, 45, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 3rem;
      border: 1px solid rgba(255, 100, 80, 0.3);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 120, 80, 0.15) inset;
      overflow: hidden;
      transition: all 0.3s ease;
      z-index: 2;
    }

    .header {
      background: rgba(30, 15, 20, 0.7);
      padding: 1.8rem 2rem;
      text-align: center;
      border-bottom: 1px solid rgba(255, 100, 70, 0.4);
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFFFFF, #ffaa66, #ff6b4a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .header p {
      color: #ffbb99;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
    }

    .step-container {
      padding: 2.2rem 2rem 2.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .input-group label {
      font-weight: 600;
      color: #ffd5b5;
      letter-spacing: 0.3px;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .robux-icon {
      background: #ff884d20;
      padding: 4px 8px;
      border-radius: 40px;
      font-size: 0.75rem;
    }

    input {
      width: 100%;
      padding: 1rem 1.2rem;
      background: #0f172f;
      border: 1.5px solid #5a3a2a;
      border-radius: 2rem;
      font-size: 1.1rem;
      color: white;
      font-weight: 500;
      transition: all 0.25s;
      outline: none;
    }

    input:focus {
      border-color: #ff8c5a;
      box-shadow: 0 0 0 3px rgba(255, 140, 90, 0.3);
      background: #0b1127;
    }

    input::placeholder {
      color: #6a4a3a;
      font-weight: 400;
      font-size: 0.9rem;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.5rem;
      justify-content: space-between;
      align-items: center;
    }

    button {
      background: linear-gradient(95deg, #2a1f28, #1a121f);
      border: none;
      padding: 0.85rem 1.6rem;
      border-radius: 3rem;
      font-weight: bold;
      font-size: 0.9rem;
      color: #ffe0cc;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255, 120, 70, 0.4);
    }

    button.primary {
      background: linear-gradient(95deg, #8b4a2a, #5e2e1a);
      box-shadow: 0 6px 14px rgba(255, 100, 50, 0.25);
      color: white;
      border: none;
    }

    button.primary:hover {
      background: linear-gradient(95deg, #a85c34, #7a3a20);
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(255, 110, 60, 0.4);
    }

    button:hover {
      background: #3a2a2a;
      border-color: #ff9a6a;
    }

    .reset-btn {
      background: rgba(255, 80, 80, 0.15);
      border-color: rgba(255, 120, 120, 0.5);
      color: #ffb7b7;
    }

    .reset-btn:hover {
      background: rgba(255, 70, 70, 0.3);
      color: white;
    }

    .message-area {
      margin-top: 1.8rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      border-left: 3px solid #ff884d;
      backdrop-filter: blur(4px);
    }

    .info-message {
      color: #ffcca5;
    }

    .error-message {
      color: #ffa098;
      background: rgba(255, 80, 80, 0.1);
      border-left-color: #ff6a4b;
    }

    .success-message {
      color: #a3ffc2;
      border-left-color: #4aff8d;
      background: rgba(0, 255, 100, 0.05);
    }

    .robux-highlight {
      font-weight: 800;
      color: #ffaa66;
      background: #2e1e1a;
      display: inline-block;
      padding: 0 8px;
      border-radius: 40px;
    }

    footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.7rem;
      color: #aa7a5a;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-transition {
      animation: fadeSlide 0.3s ease-out;
    }

    .error-shake {
      animation: shakeInput 0.25s ease-in-out 0s 2;
      border-color: #ff7760 !important;
    }
    
    @keyframes shakeInput {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 500px) {
      .step-container {
        padding: 1.5rem;
      }
      button {
        padding: 0.7rem 1.2rem;
      }
    }
  </style>
