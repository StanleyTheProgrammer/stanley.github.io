<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #0c1222);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #111827;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px black;
        }

        h1 {
            color: #ffaa66;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #ffbb99;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .question {
            color: #ffd5b5;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            border-color: #ff8c5a;
        }

        .hint {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 20px;
        }

        button {
            background: #8b4a2a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            background: #a85c34;
        }

        .reset-btn {
            background: #374151;
        }

        .reset-btn:hover {
            background: #4b5563;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .error {
            background: rgba(255, 80, 80, 0.1);
            color: #ffa098;
            border-left: 3px solid #ff6a4b;
        }

        .success {
            background: rgba(0, 255, 100, 0.05);
            color: #a3ffc2;
            border-left: 3px solid #4aff8d;
        }

        .info {
            background: rgba(0, 0, 0, 0.4);
            color: #ffcca5;
            border-left: 3px solid #ff884d;
        }

        .summary {
            background: rgba(255, 100, 50, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffaa66;
            font-size: 18px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #374151;
            color: #6b7280;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ROBUX GENERATOR</h1>
        <div class="subtitle">extremely limited funds • we're broke</div>
        
        <!-- Step 1: Ask for Robux -->
        <div id="step1">
            <div class="question">HOW MANY ROBUX DO YOU WANT?</div>
            <input type="number" id="robuxInput" placeholder="Enter number (1-10)" min="1" max="10">
            <div class="hint">⚠️ we're broke — only 1 to 10 robux available</div>
            <button id="continueBtn">CONTINUE</button>
            <button id="resetBtn" class="reset-btn">RESET</button>
            <div id="errorMsg" class="message error hidden"></div>
        </div>
        
        <!-- Step 2: Ask for Username -->
        <div id="step2" class="hidden">
            <div id="summary" class="summary"></div>
            <div class="question">YOUR ROBLOX USERNAME</div>
            <input type="text" id="usernameInput" placeholder="e.g., CoolBuilder123">
            <div class="hint">3-20 characters • letters, numbers, underscores</div>
            <button id="submitBtn">CONFIRM & PROCESS</button>
            <button id="backBtn">BACK</button>
            <button id="startOverBtn" class="reset-btn">START OVER</button>
            <div id="resultMsg" class="message hidden"></div>
        </div>
        
        <footer>balance: 10 robux total • don't be greedy</footer>
    </div>

    <script>
        // Get elements
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const robuxInput = document.getElementById('robuxInput');
        const continueBtn = document.getElementById('continueBtn');
        const resetBtn = document.getElementById('resetBtn');
        const errorMsg = document.getElementById('errorMsg');
        const summary = document.getElementById('summary');
        const usernameInput = document.getElementById('usernameInput');
        const submitBtn = document.getElementById('submitBtn');
        const backBtn = document.getElementById('backBtn');
        const startOverBtn = document.getElementById('startOverBtn');
        const resultMsg = document.getElementById('resultMsg');
        
        let selectedRobux = '';
        
        // Hide message function
        function hideMessage(element) {
            element.classList.add('hidden');
        }
        
        // Show error function
        function showError(element, message) {
            element.innerHTML = message;
            element.classList.remove('hidden');
            setTimeout(function() {
                element.classList.add('hidden');
            }, 3000);
        }
        
        // Show success function
        function showSuccess(element, message) {
            element.innerHTML = message;
            element.classList.remove('hidden');
            element.classList.add('success');
            setTimeout(function() {
                element.classList.add('hidden');
                element.classList.remove('success');
            }, 5000);
        }
        
        // Validate Robux (1-10 only)
        function validateRobux(value) {
            let num = Number(value);
            
            if (value === '') {
                showError(errorMsg, 'Please enter a Robux amount!');
                return false;
            }
            
            if (isNaN(num)) {
                showError(errorMsg, 'Please enter a valid number!');
                return false;
            }
            
            if (!Number.isInteger(num)) {
                showError(errorMsg, 'Please enter a whole number!');
                return false;
            }
            
            if (num > 10) {
                alert("we're broke only 1-10 robux pls");
                return false;
            }
            
            if (num < 1) {
                showError(errorMsg, 'Robux amount must be at least 1!');
                return false;
            }
            
            return true;
        }
        
        // Validate username
        function validateUsername(username) {
            if (username === '') {
                showError(resultMsg, 'Please enter your Roblox username!');
                return false;
            }
            
            if (username.length < 3) {
                showError(resultMsg, 'Username must be at least 3 characters!');
                return false;
            }
            
            if (username.length > 20) {
                showError(resultMsg, 'Username must be less than 20 characters!');
                return false;
            }
            
            let validPattern = /^[a-zA-Z0-9_]+$/;
            if (!validPattern.test(username)) {
                showError(resultMsg, 'Username can only contain letters, numbers, and underscores!');
                return false;
            }
            
            return true;
        }
        
        // Continue button click
        continueBtn.onclick = function() {
            let robuxValue = robuxInput.value;
            
            if (validateRobux(robuxValue)) {
                selectedRobux = robuxValue;
                summary.innerHTML = 'REQUESTED: <strong style="color:#ffaa66">' + selectedRobux + ' Robux</strong> (we are broke but ok)';
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                usernameInput.value = '';
                hideMessage(resultMsg);
                usernameInput.focus();
            }
        };
        
        // Reset button click
        resetBtn.onclick = function() {
            robuxInput.value = '';
            hideMessage(errorMsg);
        };
        
        // Submit button click
        submitBtn.onclick = function() {
            let username = usernameInput.value.trim();
            
            if (validateUsername(username)) {
                let safeUsername = username.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
                
                showSuccess(resultMsg, '✅ GENERATION COMPLETE!<br><br>' + selectedRobux + ' Robux sent to <strong>' + safeUsername + '</strong><br><br>💸 Just kidding, we are broke! This is a simulation.');
                
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.6';
            }
        };
        
        // Back button click
        backBtn.onclick = function() {
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            robuxInput.value = selectedRobux;
            hideMessage(errorMsg);
            hideMessage(resultMsg);
        };
        
        // Start over button click
        startOverBtn.onclick = function() {
            selectedRobux = '';
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            robuxInput.value = '';
            usernameInput.value = '';
            hideMessage(errorMsg);
            hideMessage(resultMsg);
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            robuxInput.focus();
        };
        
        // Enter key support
        robuxInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                continueBtn.click();
            }
        });
        
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (!submitBtn.disabled) {
                    submitBtn.click();
                }
            }
        });
    </script>
</body>
</html>
