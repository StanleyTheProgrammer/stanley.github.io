<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robux Generator • Roblox API Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #0a0f1e, #0c1222);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #111827;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px black;
        }

        h1 {
            color: #ffaa66;
            text-align: center;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #ffbb99;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .question {
            color: #ffd5b5;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1f2937;
            border: 2px solid #374151;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input:focus {
            outline: none;
            border-color: #ff8c5a;
        }

        .hint {
            color: #9ca3af;
            font-size: 12px;
            margin-bottom: 20px;
        }

        button {
            background: #8b4a2a;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-right: 10px;
            margin-top: 10px;
        }

        button:hover {
            background: #a85c34;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .reset-btn {
            background: #374151;
        }

        .reset-btn:hover {
            background: #4b5563;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .error {
            background: rgba(255, 80, 80, 0.1);
            color: #ffa098;
            border-left: 3px solid #ff6a4b;
        }

        .success {
            background: rgba(0, 255, 100, 0.05);
            color: #a3ffc2;
            border-left: 3px solid #4aff8d;
        }

        .info {
            background: rgba(0, 0, 0, 0.4);
            color: #ffcca5;
            border-left: 3px solid #ff884d;
        }

        .warning {
            background: rgba(255, 170, 0, 0.1);
            color: #ffcc66;
            border-left: 3px solid #ffaa00;
        }

        .summary {
            background: rgba(255, 100, 50, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffaa66;
            font-size: 18px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #374151;
            color: #6b7280;
            font-size: 12px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ROBUX GENERATOR</h1>
        <div class="subtitle">powered by Roblox API • we're broke</div>
        
        <!-- Step 1: Ask for Robux -->
        <div id="step1">
            <div class="question">HOW MANY ROBUX DO YOU WANT?</div>
            <input type="number" id="robuxInput" placeholder="Enter number (1-10)" min="1" max="10">
            <div class="hint">⚠️ we're broke — only 1 to 10 robux available</div>
            <button id="continueBtn">CONTINUE</button>
            <button id="resetBtn" class="reset-btn">RESET</button>
            <div id="errorMsg" class="message error hidden"></div>
        </div>
        
        <!-- Step 2: Ask for Username with API Verification -->
        <div id="step2" class="hidden">
            <div id="summary" class="summary"></div>
            <div class="question">YOUR ROBLOX USERNAME</div>
            <input type="text" id="usernameInput" placeholder="e.g., CoolBuilder123">
            <div class="hint">3-20 characters • letters, numbers, underscores</div>
            <button id="verifyBtn">VERIFY USERNAME</button>
            <button id="backBtn">BACK</button>
            <button id="startOverBtn" class="reset-btn">START OVER</button>
            <div id="verifyMsg" class="message hidden"></div>
            <div id="verifiedUserInfo" class="message info hidden" style="display:none;"></div>
            <button id="submitBtn" class="hidden" style="background:#10b981;">✅ CONFIRM & PROCESS</button>
        </div>
        
        <footer>API verified • real Roblox accounts only</footer>
    </div>

    <script>
        // Get elements
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        const robuxInput = document.getElementById('robuxInput');
        const continueBtn = document.getElementById('continueBtn');
        const resetBtn = document.getElementById('resetBtn');
        const errorMsg = document.getElementById('errorMsg');
        const summary = document.getElementById('summary');
        const usernameInput = document.getElementById('usernameInput');
        const verifyBtn = document.getElementById('verifyBtn');
        const backBtn = document.getElementById('backBtn');
        const startOverBtn = document.getElementById('startOverBtn');
        const verifyMsg = document.getElementById('verifyMsg');
        const verifiedUserInfo = document.getElementById('verifiedUserInfo');
        const submitBtn = document.getElementById('submitBtn');
        
        let selectedRobux = '';
        let verifiedUsername = '';
        let verifiedUserId = '';
        
        // Hide message function
        function hideMessage(element) {
            element.classList.add('hidden');
        }
        
        // Show message function
        function showMessage(element, type, message) {
            element.innerHTML = message;
            element.classList.remove('hidden');
            element.classList.remove('error', 'success', 'info', 'warning');
            element.classList.add(type);
            
            // Auto-hide after 4 seconds for non-error messages
            if (type !== 'error') {
                setTimeout(function() {
                    if (element && !element.classList.contains('hidden')) {
                        element.classList.add('hidden');
                    }
                }, 5000);
            }
        }
        
        // Validate Robux (1-10 only)
        function validateRobux(value) {
            let num = Number(value);
            
            if (value === '') {
                showMessage(errorMsg, 'error', 'Please enter a Robux amount!');
                return false;
            }
            
            if (isNaN(num)) {
                showMessage(errorMsg, 'error', 'Please enter a valid number!');
                return false;
            }
            
            if (!Number.isInteger(num)) {
                showMessage(errorMsg, 'error', 'Please enter a whole number!');
                return false;
            }
            
            if (num > 10) {
                alert("we're broke only 1-10 robux pls");
                return false;
            }
            
            if (num < 1) {
                showMessage(errorMsg, 'error', 'Robux amount must be at least 1!');
                return false;
            }
            
            return true;
        }
        
        // Basic username format validation
        function validateUsernameFormat(username) {
            if (username === '') {
                showMessage(verifyMsg, 'error', 'Please enter a Roblox username!');
                return false;
            }
            
            if (username.length < 3) {
                showMessage(verifyMsg, 'error', 'Username must be at least 3 characters!');
                return false;
            }
            
            if (username.length > 20) {
                showMessage(verifyMsg, 'error', 'Username must be less than 20 characters!');
                return false;
            }
            
            let validPattern = /^[a-zA-Z0-9_]+$/;
            if (!validPattern.test(username)) {
                showMessage(verifyMsg, 'error', 'Username can only contain letters, numbers, and underscores!');
                return false;
            }
            
            return true;
        }
        
        // Roblox API: Check if username exists and get user info
        // Uses the official Roblox API endpoint: https://api.roblox.com/users/get-by-username [citation:1]
        async function checkRobloxUsername(username) {
            try {
                // Show loading state
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = 'VERIFYING... <span class="loading"></span>';
                
                // API endpoint to get user by username
                const apiUrl = `https://api.roblox.com/users/get-by-username?username=${encodeURIComponent(username)}`;
                
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                // Reset button state
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'VERIFY USERNAME';
                
                // Check if user exists
                // The API returns an object with 'Id' if user exists, or an empty/success false response if not [citation:1]
                if (data && data.Id) {
                    return {
                        exists: true,
                        userId: data.Id,
                        username: data.Username
                    };
                } else {
                    return {
                        exists: false,
                        userId: null,
                        username: null
                    };
                }
            } catch (error) {
                console.error('API Error:', error);
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = 'VERIFY USERNAME';
                return {
                    exists: null,
                    userId: null,
                    username: null,
                    error: true
                };
            }
        }
        
        // Verify username with Roblox API
        async function verifyUsername() {
            const username = usernameInput.value.trim();
            
            // Clear previous messages
            verifyMsg.classList.add('hidden');
            verifiedUserInfo.classList.add('hidden');
            submitBtn.classList.add('hidden');
            
            // Format validation first
            if (!validateUsernameFormat(username)) {
                return;
            }
            
            // Call Roblox API
            const result = await checkRobloxUsername(username);
            
            if (result.error) {
                showMessage(verifyMsg, 'error', '⚠️ API error. Please check your internet connection and try again.');
                return;
            }
            
            if (result.exists) {
                // Username exists on Roblox!
                verifiedUsername = result.username;
                verifiedUserId = result.userId;
                
                // Show success with user info
                showMessage(verifyMsg, 'success', `✅ USER VERIFIED! "${result.username}" is a real Roblox account.`);
                
                // Show detailed user info
                verifiedUserInfo.innerHTML = `
                    <strong>✓ Account Verified</strong><br>
                    Username: ${escapeHtml(result.username)}<br>
                    User ID: ${result.userId}<br>
                    <span style="font-size:12px;">🎮 Real Roblox account confirmed via API</span>
                `;
                verifiedUserInfo.classList.remove('hidden');
                
                // Show the confirm button
                submitBtn.classList.remove('hidden');
                
            } else {
                // Username does NOT exist
                showMessage(verifyMsg, 'warning', `❌ "${username}" is NOT a valid Roblox username. Account does not exist. Please check spelling.`);
                verifiedUsername = '';
                verifiedUserId = '';
            }
        }
        
        // Final submission
        function processFinal() {
            if (!verifiedUsername) {
                showMessage(verifyMsg, 'error', 'Please verify your username first!');
                return;
            }
            
            // Show success message
            verifyMsg.classList.remove('hidden');
            verifyMsg.classList.remove('error', 'warning');
            verifyMsg.classList.add('success');
            verifyMsg.innerHTML = `🎉 GENERATION COMPLETE!<br><br>${selectedRobux} Robux sent to <strong>${escapeHtml(verifiedUsername)}</strong> (User ID: ${verifiedUserId})<br><br>💸 Just kidding, we are broke! This is a simulation.<br><br><span style="font-size:12px;">✓ Verified via Roblox API</span>`;
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.style.opacity = '0.6';
            submitBtn.style.cursor = 'default';
        }
        
        // Continue button click (Step 1 -> Step 2)
        continueBtn.onclick = function() {
            let robuxValue = robuxInput.value;
            
            if (validateRobux(robuxValue)) {
                selectedRobux = robuxValue;
                summary.innerHTML = 'REQUESTED: <strong style="color:#ffaa66">' + selectedRobux + ' Robux</strong> (we are broke but ok)';
                step1.classList.add('hidden');
                step2.classList.remove('hidden');
                usernameInput.value = '';
                verifiedUsername = '';
                verifiedUserId = '';
                verifyMsg.classList.add('hidden');
                verifiedUserInfo.classList.add('hidden');
                submitBtn.classList.add('hidden');
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                usernameInput.focus();
            }
        };
        
        // Reset button click (Step 1)
        resetBtn.onclick = function() {
            robuxInput.value = '';
            errorMsg.classList.add('hidden');
        };
        
        // Verify button click
        verifyBtn.onclick = function() {
            verifyUsername();
        };
        
        // Submit button click
        submitBtn.onclick = function() {
            if (!submitBtn.disabled) {
                processFinal();
            }
        };
        
        // Back button click
        backBtn.onclick = function() {
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            robuxInput.value = selectedRobux;
            errorMsg.classList.add('hidden');
        };
        
        // Start over button click
        startOverBtn.onclick = function() {
            selectedRobux = '';
            verifiedUsername = '';
            verifiedUserId = '';
            step2.classList.add('hidden');
            step1.classList.remove('hidden');
            robuxInput.value = '';
            usernameInput.value = '';
            errorMsg.classList.add('hidden');
            verifyMsg.classList.add('hidden');
            verifiedUserInfo.classList.add('hidden');
            submitBtn.classList.add('hidden');
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            robuxInput.focus();
        };
        
        // Enter key support
        robuxInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                continueBtn.click();
            }
        });
        
        usernameInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyBtn.click();
            }
        });
        
        // Escape HTML for safety
        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
    </script>
</body>
</html>
