<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
    <title>3D Multiplayer Shooter (Mobile Fixed)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            background-color: #111;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(4px);
            border: 1px solid #444;
        }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 20px;
            pointer-events: none;
            z-index: 20;
        }
        #joystick-zone {
            width: 140px;
            height: 140px;
            background: rgba(20,20,20,0.4);
            border-radius: 70px;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            touch-action: none;
            margin-bottom: 10px;
        }
        #shoot-btn {
            width: 100px;
            height: 100px;
            background: rgba(200,30,30,0.7);
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 3px solid rgba(255,255,255,0.4);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            text-transform: uppercase;
            pointer-events: auto;
            touch-action: none;
            user-select: none;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
            margin-bottom: 30px;
            margin-right: 10px;
            transition: transform 0.05s;
        }
        #shoot-btn:active {
            transform: scale(0.9);
            background: rgba(255,50,50,0.9);
        }
        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20,20,30,0.95);
            color: white;
            padding: 30px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid #3a5a7a;
            text-align: center;
            z-index: 100;
            min-width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            pointer-events: auto;
        }
        #menu.hidden {
            display: none;
        }
        #menu h2 {
            margin-top: 0;
            color: #7ab7ef;
            text-shadow: 0 0 10px #1e4f8a;
        }
        #menu input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #2a2a3c;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            border: 1px solid #4a6c8a;
        }
        #menu button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: #2e7d32;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 3px solid #1b5e20;
        }
        #menu button.secondary {
            background: #1565c0;
            border-bottom: 3px solid #0d47a1;
        }
        #menu button:hover {
            filter: brightness(1.1);
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #aaccff;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            border: 1px solid #000;
            pointer-events: none;
            z-index: 5;
        }
        #health-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #555;
            z-index: 15;
            backdrop-filter: blur(4px);
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            transition: width 0.1s;
        }
        #scoreboard {
            position: absolute;
            top: 10px;
            right: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            font-size: 16px;
            border: 1px solid #666;
            z-index: 10;
        }
        @media (max-width: 600px) {
            #joystick-zone { width: 120px; height: 120px; }
            #shoot-btn { width: 80px; height: 80px; font-size: 20px; }
        }
    </style>
    <!-- Import Maps -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <!-- PeerJS -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <!-- NippleJS -->
    <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.9.0/dist/nipplejs.min.js"></script>
</head>
<body>
    <div id="info">🔫 3D Shooter | <span id="connection-status">Offline</span></div>
    <div id="scoreboard">❤️ <span id="health-value">100</span> | 🎯 <span id="kills-value">0</span> Kills</div>
    <div id="health-bar"><div id="health-fill"></div></div>
    <div id="crosshair"></div>

    <div id="menu">
        <h2>MULTIPLAYER SHOOTER</h2>
        <p style="font-size:14px; margin-top:-5px; opacity:0.8;">Peer-to-Peer · Mobile Ready</p>
        <input type="text" id="peer-id-input" placeholder="Your ID (auto-generated)" readonly>
        <input type="text" id="remote-id-input" placeholder="Host ID to join">
        <button id="host-btn" class="secondary">🎮 HOST GAME</button>
        <button id="join-btn">🔗 JOIN GAME</button>
        <button id="disconnect-btn" style="background:#6c757d; border-bottom-color:#495057;">🚪 DISCONNECT</button>
        <div id="status">Ready. Host to create a game.</div>
        <p style="font-size:12px; margin-top:15px; opacity:0.6;">Joystick: drag up = forward<br>Tap SHOOT to fire.</p>
    </div>

    <div id="ui-container">
        <div id="joystick-zone"></div>
        <div id="shoot-btn">🔫<br>SHOOT</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Configuration ---
        const WORLD_SIZE = 40;
        const PLAYER_HEIGHT = 2.0;
        const PLAYER_SPEED = 0.12;
        const SHOOT_COOLDOWN = 300; // ms
        const UPDATE_RATE = 50; // ms

        // --- Global State ---
        let scene, camera, renderer, labelRenderer;
        let peer, connections = {};
        let myPeerId = null;
        let isHost = false;
        let gameActive = false;
        
        let players = new Map();
        let localPlayer = {
            id: null,
            mesh: null,
            health: 100,
            kills: 0,
            position: new THREE.Vector3(0, PLAYER_HEIGHT/2, 0),
            rotation: 0,
            lastShot: 0
        };
        
        // Controls
        let joystick = null;
        let moveDirection = { x: 0, y: 0 }; // x: left/right, y: forward/backward (will map to world Z)
        let shootPressed = false;
        let keys = { w: false, s: false, a: false, d: false };
        
        let obstacles = [];
        
        // UI Elements
        const menuDiv = document.getElementById('menu');
        const statusDiv = document.getElementById('status');
        const connStatusSpan = document.getElementById('connection-status');
        const healthSpan = document.getElementById('health-value');
        const killsSpan = document.getElementById('kills-value');
        const healthFill = document.getElementById('health-fill');
        const peerIdInput = document.getElementById('peer-id-input');
        const remoteIdInput = document.getElementById('remote-id-input');
        const hostBtn = document.getElementById('host-btn');
        const joinBtn = document.getElementById('join-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');

        // --- Initialize Three.js Scene ---
        function initThree() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111122);
            scene.fog = new THREE.FogExp2(0x111122, 0.015);
            
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);
            
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
            dirLight.position.set(10, 20, 5);
            dirLight.castShadow = true;
            dirLight.receiveShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            const d = 30;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.camera.near = 1;
            dirLight.shadow.camera.far = 50;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);
            
            const fillLight = new THREE.PointLight(0x446688, 0.5);
            fillLight.position.set(-10, 10, 10);
            scene.add(fillLight);
            
            // Ground
            const groundGeometry = new THREE.CircleGeometry(WORLD_SIZE, 32);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2a5a5a, roughness: 0.8 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = 0;
            ground.receiveShadow = true;
            scene.add(ground);
            
            const gridHelper = new THREE.GridHelper(WORLD_SIZE*2, 20, 0x88aacc, 0x334455);
            gridHelper.position.y = 0.01;
            scene.add(gridHelper);
            
            createObstacles();
            
            // Boundary
            const boundaryPoints = [
                new THREE.Vector3(-WORLD_SIZE, 0.1, -WORLD_SIZE),
                new THREE.Vector3( WORLD_SIZE, 0.1, -WORLD_SIZE),
                new THREE.Vector3( WORLD_SIZE, 0.1,  WORLD_SIZE),
                new THREE.Vector3(-WORLD_SIZE, 0.1,  WORLD_SIZE),
                new THREE.Vector3(-WORLD_SIZE, 0.1, -WORLD_SIZE)
            ];
            const boundaryGeo = new THREE.BufferGeometry().setFromPoints(boundaryPoints);
            const boundaryLine = new THREE.Line(boundaryGeo, new THREE.LineBasicMaterial({ color: 0x5a7a9a }));
            scene.add(boundaryLine);
        }
        
        function createObstacles() {
            const boxGeo = new THREE.BoxGeometry(2, 1, 2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x8b5e3c, roughness: 0.7 });
            const positions = [
                [8,0,5], [-7,0,-8], [10,0,-10], [-12,0,12],
                [15,0,-5], [-15,0,7], [5,0,15], [-5,0,-15]
            ];
            positions.forEach(pos => {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(pos[0], 0.5, pos[2]);
                box.receiveShadow = true;
                box.castShadow = true;
                scene.add(box);
                obstacles.push(box);
            });
            
            const pillarGeo = new THREE.CylinderGeometry(0.8, 1, 2.5);
            const pillarMat = new THREE.MeshStandardMaterial({ color: 0x7a8a9a });
            [[18,0], [-18,0], [0,18], [0,-18]].forEach(([x,z]) => {
                const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                pillar.position.set(x, 1.25, z);
                pillar.receiveShadow = true;
                pillar.castShadow = true;
                scene.add(pillar);
                obstacles.push(pillar);
            });
        }
        
        function createPlayerMesh(color = 0x3498db, isLocal = false) {
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, PLAYER_HEIGHT, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: color, emissive: isLocal ? new THREE.Color(0x224466) : new THREE.Color(0x000000) });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = PLAYER_HEIGHT/2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const headGeo = new THREE.SphereGeometry(0.35);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = PLAYER_HEIGHT + 0.15;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            const gunGeo = new THREE.BoxGeometry(0.2, 0.1, 0.8);
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const gun = new THREE.Mesh(gunGeo, gunMat);
            gun.position.set(0.5, PLAYER_HEIGHT*0.7, 0.4);
            gun.castShadow = true;
            group.add(gun);
            
            const arrowGeo = new THREE.ConeGeometry(0.3, 0.6);
            const arrowMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
            const arrow = new THREE.Mesh(arrowGeo, arrowMat);
            arrow.position.set(0, 0.2, 0.8);
            arrow.rotation.x = Math.PI / 2;
            arrow.castShadow = true;
            group.add(arrow);
            
            return group;
        }
        
        function createNameTag(text, color = '#ffffff') {
            const div = document.createElement('div');
            div.textContent = text;
            div.style.color = color;
            div.style.fontSize = '14px';
            div.style.fontWeight = 'bold';
            div.style.textShadow = '1px 1px 3px black';
            div.style.padding = '2px 8px';
            div.style.background = 'rgba(0,0,0,0.5)';
            div.style.borderRadius = '12px';
            div.style.pointerEvents = 'none';
            div.style.whiteSpace = 'nowrap';
            return new CSS2DObject(div);
        }

        // --- Networking ---
        function initializePeer() {
            myPeerId = 'player-' + Math.random().toString(36).substr(2, 8);
            peerIdInput.value = myPeerId;
            
            peer = new Peer(myPeerId, {
                debug: 2,
                config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
            });
            
            peer.on('open', (id) => {
                statusDiv.innerText = 'Connected to signaling.';
                connStatusSpan.innerText = 'Signaling Ready';
            });
            
            peer.on('connection', (conn) => {
                if (isHost) {
                    setupConnection(conn);
                    statusDiv.innerText = `Player joined.`;
                    setTimeout(() => sendWorldState(conn), 500);
                } else {
                    conn.close();
                }
            });
            
            peer.on('error', (err) => {
                console.error(err);
                statusDiv.innerText = 'Error: ' + err.type;
            });
        }
        
        function setupConnection(conn) {
            connections[conn.peer] = conn;
            
            conn.on('data', (data) => {
                handleNetworkMessage(conn.peer, data);
            });
            
            conn.on('close', () => {
                removePlayer(conn.peer);
                delete connections[conn.peer];
                if (isHost) broadcastToClients({ type: 'playerLeft', id: conn.peer });
            });
        }
        
        function handleNetworkMessage(fromId, data) {
            if (!gameActive) return;
            
            if (isHost) {
                if (data.type === 'input') {
                    const p = players.get(fromId);
                    if (p) p.lastInput = data;
                } else if (data.type === 'shoot') {
                    handleShootFromClient(fromId, data);
                }
            } else {
                if (data.type === 'worldState') {
                    applyWorldState(data.players);
                } else if (data.type === 'playerJoined') {
                    addRemotePlayer(data.id, data.color, data.position);
                } else if (data.type === 'playerLeft') {
                    removePlayer(data.id);
                } else if (data.type === 'hit') {
                    if (data.targetId === myPeerId) {
                        localPlayer.health = data.health;
                        updateLocalUI();
                        if (localPlayer.health <= 0) respawnLocal();
                    } else {
                        const target = players.get(data.targetId);
                        if (target) target.health = data.health;
                    }
                }
            }
        }
        
        function sendToHost(data) {
            const conn = Object.values(connections)[0];
            if (conn) conn.send(data);
        }
        
        function broadcastToClients(data, exclude = null) {
            Object.entries(connections).forEach(([id, conn]) => {
                if (id !== exclude) conn.send(data);
            });
        }
        
        function sendWorldState(conn) {
            const state = { type: 'worldState', players: {} };
            players.forEach((p, id) => {
                state.players[id] = {
                    position: p.mesh.position,
                    rotation: p.mesh.rotation.y,
                    health: p.health,
                    kills: p.kills
                };
            });
            state.players[myPeerId] = {
                position: localPlayer.mesh.position,
                rotation: localPlayer.mesh.rotation.y,
                health: localPlayer.health,
                kills: localPlayer.kills
            };
            conn.send(state);
        }
        
        function applyWorldState(statePlayers) {
            Object.entries(statePlayers).forEach(([id, data]) => {
                if (id === myPeerId) return;
                let p = players.get(id);
                if (!p) {
                    addRemotePlayer(id, 0xe67e22, data.position);
                    p = players.get(id);
                }
                if (p) {
                    p.mesh.position.copy(data.position);
                    p.mesh.rotation.y = data.rotation;
                    p.health = data.health;
                    p.kills = data.kills;
                    if (p.nameTag) {
                        p.nameTag.element.textContent = `${id.slice(0,6)} ❤️${Math.ceil(p.health)}`;
                    }
                }
            });
        }
        
        function removePlayer(id) {
            const p = players.get(id);
            if (p) {
                scene.remove(p.mesh);
                scene.remove(p.nameTag);
                players.delete(id);
            }
        }
        
        function addRemotePlayer(id, color, position) {
            if (players.has(id) || id === myPeerId) return;
            const mesh = createPlayerMesh(color);
            mesh.position.copy(position);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            const tag = createNameTag(`${id.slice(0,6)} ❤️100`, '#aaccff');
            tag.position.set(0, 3.2, 0);
            mesh.add(tag);
            
            players.set(id, {
                mesh, health: 100, kills: 0, nameTag: tag, lastInput: null
            });
        }
        
        function handleShootFromClient(shooterId, data) {
            const shooter = players.get(shooterId);
            if (!shooter || shooter.health <= 0) return;
            const now = Date.now();
            if (shooter.lastShot && (now - shooter.lastShot) < SHOOT_COOLDOWN) return;
            shooter.lastShot = now;
            
            const origin = shooter.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0));
            const dir = new THREE.Vector3(0, 0, 1).applyEuler(new THREE.Euler(0, data.rotation, 0));
            const raycaster = new THREE.Raycaster(origin, dir, 0, 50);
            
            const meshes = [];
            players.forEach(p => meshes.push(p.mesh));
            if (localPlayer.mesh) meshes.push(localPlayer.mesh);
            
            const hits = raycaster.intersectObjects(meshes, true);
            if (hits.length > 0) {
                let hitMesh = hits[0].object;
                while (hitMesh.parent && !hitMesh.parent.isGroup) hitMesh = hitMesh.parent;
                
                let targetId = null;
                if (hitMesh === localPlayer.mesh) targetId = myPeerId;
                else {
                    for (let [id, p] of players) if (p.mesh === hitMesh) { targetId = id; break; }
                }
                
                if (targetId) {
                    const damage = 34;
                    if (targetId === myPeerId) {
                        localPlayer.health = Math.max(0, localPlayer.health - damage);
                        updateLocalUI();
                        if (localPlayer.health <= 0) { respawnHost(); shooter.kills++; }
                        broadcastToClients({ type: 'hit', targetId: myPeerId, health: localPlayer.health });
                    } else {
                        const target = players.get(targetId);
                        if (target) {
                            target.health = Math.max(0, target.health - damage);
                            if (target.health <= 0) {
                                target.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
                                target.health = 100;
                                shooter.kills++;
                            }
                            broadcastToClients({ type: 'hit', targetId, health: target.health });
                        }
                    }
                }
            }
            broadcastToClients({ type: 'shotFired', position: origin });
        }
        
        function respawnHost() {
            localPlayer.health = 100;
            localPlayer.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
            updateLocalUI();
        }
        
        function respawnLocal() {
            localPlayer.health = 100;
            localPlayer.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
            updateLocalUI();
        }
        
        function updateLocalUI() {
            healthSpan.textContent = Math.ceil(localPlayer.health);
            killsSpan.textContent = localPlayer.kills;
            healthFill.style.width = Math.max(0, localPlayer.health) + '%';
        }

        // --- Player Update ---
        function updateLocalPlayer(deltaTime) {
            if (!localPlayer.mesh || !gameActive) return;
            
            let moveX = moveDirection.x;
            let moveZ = moveDirection.y;
            
            // Keyboard fallback
            if (keys.w) moveZ += 1;
            if (keys.s) moveZ -= 1;
            if (keys.a) moveX -= 1;
            if (keys.d) moveX += 1;
            
            if (moveX !== 0 || moveZ !== 0) {
                const len = Math.sqrt(moveX*moveX + moveZ*moveZ);
                moveX /= len;
                moveZ /= len;
                
                const speed = PLAYER_SPEED * deltaTime * 60;
                const newPos = localPlayer.mesh.position.clone();
                newPos.x += moveX * speed;
                newPos.z += moveZ * speed;
                
                newPos.x = Math.max(-WORLD_SIZE+1, Math.min(WORLD_SIZE-1, newPos.x));
                newPos.z = Math.max(-WORLD_SIZE+1, Math.min(WORLD_SIZE-1, newPos.z));
                
                let collides = false;
                for (let obs of obstacles) {
                    const dx = newPos.x - obs.position.x;
                    const dz = newPos.z - obs.position.z;
                    if (Math.sqrt(dx*dx + dz*dz) < 1.2) { collides = true; break; }
                }
                if (!collides) localPlayer.mesh.position.copy(newPos);
                
                const angle = Math.atan2(moveX, moveZ);
                localPlayer.mesh.rotation.y = angle;
            }
            
            if (!isHost && gameActive) {
                sendToHost({
                    type: 'input',
                    position: localPlayer.mesh.position,
                    rotation: localPlayer.mesh.rotation.y
                });
            }
            
            if (shootPressed) {
                const now = Date.now();
                if (now - localPlayer.lastShot > SHOOT_COOLDOWN) {
                    localPlayer.lastShot = now;
                    if (isHost) {
                        performLocalShoot();
                    } else {
                        sendToHost({ type: 'shoot', rotation: localPlayer.mesh.rotation.y });
                    }
                }
            }
        }
        
        function performLocalShoot() {
            const origin = localPlayer.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0));
            const dir = new THREE.Vector3(0, 0, 1).applyEuler(new THREE.Euler(0, localPlayer.mesh.rotation.y, 0));
            const raycaster = new THREE.Raycaster(origin, dir, 0, 50);
            const meshes = [];
            players.forEach(p => meshes.push(p.mesh));
            
            const hits = raycaster.intersectObjects(meshes, true);
            if (hits.length > 0) {
                let hitMesh = hits[0].object;
                while (hitMesh.parent && !hitMesh.parent.isGroup) hitMesh = hitMesh.parent;
                for (let [id, p] of players) {
                    if (p.mesh === hitMesh) {
                        p.health = Math.max(0, p.health - 34);
                        if (p.health <= 0) {
                            p.mesh.position.set((Math.random()-0.5)*20, PLAYER_HEIGHT/2, (Math.random()-0.5)*20);
                            p.health = 100;
                            localPlayer.kills++;
                            updateLocalUI();
                        }
                        broadcastToClients({ type: 'hit', targetId: id, health: p.health });
                        break;
                    }
                }
            }
            broadcastToClients({ type: 'shotFired', position: origin });
        }

        // --- Host Loop ---
        let lastHostUpdate = 0;
        function hostGameLoop() {
            if (!isHost || !gameActive) return;
            const now = Date.now();
            if (now - lastHostUpdate > UPDATE_RATE) {
                players.forEach((p, id) => {
                    if (p.lastInput) {
                        p.mesh.position.copy(p.lastInput.position);
                        p.mesh.rotation.y = p.lastInput.rotation;
                    }
                });
                
                const state = { type: 'worldState', players: {} };
                players.forEach((p, id) => {
                    state.players[id] = {
                        position: p.mesh.position,
                        rotation: p.mesh.rotation.y,
                        health: p.health,
                        kills: p.kills
                    };
                });
                state.players[myPeerId] = {
                    position: localPlayer.mesh.position,
                    rotation: localPlayer.mesh.rotation.y,
                    health: localPlayer.health,
                    kills: localPlayer.kills
                };
                broadcastToClients(state);
                lastHostUpdate = now;
            }
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (gameActive && localPlayer.mesh) {
                updateLocalPlayer(delta);
                const pos = localPlayer.mesh.position;
                camera.position.set(pos.x, pos.y + 5, pos.z + 6);
                camera.lookAt(pos.clone().add(new THREE.Vector3(0, 1.5, 0)));
            }
            
            if (isHost) hostGameLoop();
            
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // --- Controls Setup (FIXED JOYSTICK) ---
        function initControls() {
            const zone = document.getElementById('joystick-zone');
            joystick = nipplejs.create({
                zone: zone,
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'blue',
                size: 80
            });
            
            joystick.on('move', (evt, data) => {
                if (!gameActive) return;
                const force = Math.min(data.force, 1.0);
                const rad = data.angle.radian;
                // Map: angle 0 (up) -> forward (+Z), 90 (right) -> right (+X)
                moveDirection.x = Math.sin(rad) * force;
                moveDirection.y = Math.cos(rad) * force; // cos(0)=1 -> forward
            }).on('end', () => {
                moveDirection.x = 0;
                moveDirection.y = 0;
            });
            
            const shootBtn = document.getElementById('shoot-btn');
            shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); shootPressed = true; });
            shootBtn.addEventListener('touchend', (e) => { e.preventDefault(); shootPressed = false; });
            shootBtn.addEventListener('mousedown', () => shootPressed = true);
            shootBtn.addEventListener('mouseup', () => shootPressed = false);
            shootBtn.addEventListener('mouseleave', () => shootPressed = false);
            
            window.addEventListener('keydown', (e) => {
                if (e.code === 'KeyW') keys.w = true;
                if (e.code === 'KeyS') keys.s = true;
                if (e.code === 'KeyA') keys.a = true;
                if (e.code === 'KeyD') keys.d = true;
            });
            window.addEventListener('keyup', (e) => {
                if (e.code === 'KeyW') keys.w = false;
                if (e.code === 'KeyS') keys.s = false;
                if (e.code === 'KeyA') keys.a = false;
                if (e.code === 'KeyD') keys.d = false;
            });
            
            // Prevent default touch behaviors on UI elements
            document.querySelectorAll('#ui-container *').forEach(el => {
                el.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
                el.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
            });
        }

        // --- Start Game ---
        function startGame() {
            gameActive = true;
            menuDiv.classList.add('hidden');
            connStatusSpan.innerText = isHost ? 'Hosting' : 'Connected';
            
            localPlayer.mesh = createPlayerMesh(0x3498db, true);
            localPlayer.mesh.position.set((Math.random()-0.5)*10, PLAYER_HEIGHT/2, (Math.random()-0.5)*10);
            localPlayer.mesh.castShadow = true;
            localPlayer.mesh.receiveShadow = true;
            scene.add(localPlayer.mesh);
            
            const tag = createNameTag('YOU', '#7ab7ef');
            tag.position.set(0, 3.2, 0);
            localPlayer.mesh.add(tag);
            
            localPlayer.health = 100;
            localPlayer.kills = 0;
            updateLocalUI();
        }

        // --- Event Listeners ---
        hostBtn.addEventListener('click', () => {
            isHost = true;
            initializePeer();
            peer.on('open', startGame);
        });
        
        joinBtn.addEventListener('click', () => {
            const hostId = remoteIdInput.value.trim();
            if (!hostId) return statusDiv.innerText = 'Enter Host ID';
            isHost = false;
            initializePeer();
            peer.on('open', () => {
                const conn = peer.connect(hostId, { reliable: true });
                setupConnection(conn);
                conn.on('open', startGame);
            });
        });
        
        disconnectBtn.addEventListener('click', () => location.reload());
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Go! ---
        initThree();
        initControls();
        animate();
        
        peerIdInput.value = 'player-' + Math.random().toString(36).substr(2, 8);
    </script>
</body>
</html>
